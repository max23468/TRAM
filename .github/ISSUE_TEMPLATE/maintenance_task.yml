name: Maintenance task
description: Traccia manutenzione tecnica, documentale o GitHub.
title: "chore: "
labels:
  - maintenance
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Cosa va mantenuto o verificato.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist operativa
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Rischi o vincoli
      description: Segreti, dati riservati, policy GitHub, CI, docs o deploy futuri.
