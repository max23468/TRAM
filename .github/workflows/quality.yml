name: Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DOPPLER_PROJECT: ${{ vars.DOPPLER_PROJECT }}
      DOPPLER_CONFIG: ${{ vars.DOPPLER_CONFIG }}
      DOPPLER_TOKEN_PRESENT: ${{ secrets.DOPPLER_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verifica variabili Doppler
        run: |
          if [ -z "${DOPPLER_PROJECT:-}" ]; then
            echo "::warning::DOPPLER_PROJECT non impostato"
          fi
          if [ -z "${DOPPLER_CONFIG:-}" ]; then
            echo "::warning::DOPPLER_CONFIG non impostata"
          fi
          if [ "${DOPPLER_TOKEN_PRESENT}" != "true" ]; then
            echo "::notice::DOPPLER_TOKEN assente: il fetch non verrà eseguito."
          fi

      - name: Fetch secrets from Doppler
        if: ${{ env.DOPPLER_TOKEN_PRESENT == 'true' && vars.DOPPLER_PROJECT != '' && vars.DOPPLER_CONFIG != '' }}
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ vars.DOPPLER_PROJECT }}
          doppler-config: ${{ vars.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: npm run verify

      - name: Detect dependency changes
        id: dependency-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            | grep -Eq '^(package\.json|package-lock\.json)$'; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_audit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Audit dependencies
        if: steps.dependency-changes.outputs.run_audit == 'true'
        run: npm audit --audit-level=moderate
