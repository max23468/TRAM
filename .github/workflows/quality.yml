name: Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: npm run verify

      - name: Detect dependency changes
        id: dependency-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            | grep -Eq '^(package\.json|package-lock\.json)$'; then
            echo "run_audit=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_audit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Audit dependencies
        if: steps.dependency-changes.outputs.run_audit == 'true'
        run: npm audit --audit-level=moderate
